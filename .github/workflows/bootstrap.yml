# .github/workflows/bootstrap.yml
# Thin caller for the reusable bootstrap test authored in dotfiles-core. The logic
# lives there (one place for the whole fleet); this just names Arch's container +
# the deps bootstrap needs. See dotfiles-core/.github/workflows/bootstrap-test.yml.
name: bootstrap

on:
  pull_request:
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', '.github/workflows/bootstrap.yml']
  push:
    branches: [main]
    paths: ['bootstrap.sh', 'core/**', 'os/**', 'ssh/**', '.github/workflows/bootstrap.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: dotgibson/dotfiles-core/.github/workflows/bootstrap-test.yml@v3
    with:
      image: archlinux:latest
      # Full sync+upgrade, not -Sy: a partial upgrade can pull a zsh newer than the
      # base image's libs. --needed skips already-present bash.
      prep: "pacman -Syu --noconfirm --needed bash zsh"
